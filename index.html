// ====== Pure-JS AES-GCM Decrypt ======
function _gcm_ghash(H, A, C) {

        if (lsb) V[0] ^= R;

    var tmp = new Uint8Array(16);
    for (var i = 0; i < 16; i++) tmp[i] = Y[i] ^ block[i];
    return _gf_mul(tmp, H);
  }

  function _process(data, Y) {
    var n = data.length >>> 4;
    for (var i = 0; i < n; i++) Y = _ghash_block(Y, data.subarray(i*16, (i+1)*16));
    return Y;
  }

  Y = _process(A, Y);
  if (A.length & 15) {
    var pad = new Uint8Array(16);
    var rem = A.length - ((A.length>>>4)<<4);
    pad.set(A.subarray(A.length-rem));
    Y = _ghash_block(Y, pad);
  }
  Y = _process(C, Y);
  if (C.length & 15) {
    var pad = new Uint8Array(16);
    var rem = C.length - ((C.length>>>4)<<4);
    pad.set(C.subarray(C.length-rem));
    Y = _ghash_block(Y, pad);
  }

  var lenBlock = new Uint8Array(16);
  var al = A.length * 8, cl = C.length * 8;
  lenBlock[0] = (al/0x100000000)>>>0 ? 0 : 0; // simplified for small data

  lenBlock[6] = (al>>>8)&0xff; lenBlock[7] = al&0xff;
  lenBlock[12] = (cl>>>24)&0xff; lenBlock[13] = (cl>>>16)&0xff;
  lenBlock[14] = (cl>>>8)&0xff; lenBlock[15] = cl&0xff;

function _gcm_inc32(counter) {
  // counter: Uint8Array(16), increment rightmost 32 bits in-place
  var c = new Uint8Array(counter);
  c[15]++; if (c[15]===0) { c[14]++; if (c[14]===0) { c[13]++; if (c[13]===0) c[12]++; } }
  return c;
}

function _aes_gcm_decrypt(key, iv, ct) {
  // key: Uint8Array(32), iv: Uint8Array(12), ct: Uint8Array (ciphertext+tag)
  // Returns Uint8Array plaintext, or null if tag mismatch
  var tagLen = 16;
  var ctLen = ct.length - tagLen;
  if (ctLen < 0) return null;

  var tag = ct.subarray(ctLen);

  var w = _aes_key_expand_256(key);
  var zeroBlock = new Uint8Array(16);
  var H = _aes_encrypt_block(zeroBlock, w);

  var J0 = new Uint8Array(16);
  J0.set(iv);
  J0[15] = 1;

  // GCTR
  var pt = new Uint8Array(ctLen);
  var n = Math.ceil(ctLen / 16);
  var CB = _gcm_inc32(J0);
  for (var i = 0; i < n; i++) {
    var ek = _aes_encrypt_block(CB, w);
    var blk = ciphertext.subarray(i*16, Math.min((i+1)*16, ctLen));
    for (var j = 0; j < blk.length; j++) pt[i*16 + j] = blk[j] ^ ek[j];
    CB = _gcm_inc32(CB);
  }

  var S = _gcm_ghash(H, new Uint8Array(0), ciphertext);
  var T = _aes_encrypt_block(J0, w);
  var expTag = new Uint8Array(16);
  for (var i = 0; i < 16; i++) expTag[i] = T[i] ^ S[i];

  for (var i = 0; i < 16; i++) {

}

// ====== Fallback decrypt (pure JS) ======
function _decrypt_js(pw, salt, iv, ct, iter) {

// ====== Web Crypto path ======
function _decrypt_web(pw, salt, iv, ct, iter) {
  return new Promise(function(resolve, reject) {

    }).then(function(k) {

    }).then(function(r) {

    }).catch(reject);
  });
}

function chgClass(v) { return v === null || v === undefined ? 'flat' : (v >= 0 ? 'up' : 'down'); }

function arrow(v) { return v === null || v === undefined ? '' : (v >= 0 ? '\u25B2' : '\u25BC'); }

function _render(DATA) {
  var last = DATA.records[DATA.records.length - 1];
  document.getElementById('cards').innerHTML = [
    { label: 'Index', value: fmt(last.index, 2), sub: 'Base 1000pt' },
    { label: 'NAV', value: fmt(last.nav, 4), sub: 'Base 1.0000', cls: chgClass(last.chg_pct) },
    { label: 'Total MV', value: fmt(last.mv, 1), sub: 'CNY 10k' },
    { label: 'Daily Chg', value: chgSign(last.chg_pct) + fmt(last.chg_pct, 2) + '%', sub: arrow(last.chg_pct) + ' vs prev', cls: chgClass(last.chg_pct) }
  ].map(function(c) {

  }).join('');

  var labels = DATA.records.map(function(r) { return r.date; });
  var idxData = DATA.records.map(function(r) { return r.index; });
  var navData = DATA.records.map(function(r) { return r.nav; });

  // Compute running max NAV to detect new highs (since base date)

  var isNewHigh = [false];

  var navPointRadius = [0];
  var navPointColor = ['#e8913a'];

      navPointRadius.push(10);
      navPointColor.push('#ffd700');
    } else {
      isNewHigh.push(false);
      navPointStyle.push('circle');
      navPointRadius.push(3);
      navPointColor.push('#e8913a');
    }
  }

  new Chart(document.getElementById('chart'), {

    data: { labels: labels, datasets: [
      { label: 'Index', data: idxData, borderColor: '#4a6cf7', backgroundColor: 'rgba(74,108,247,0.10)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#4a6cf7', yAxisID: 'y' },
      { label: 'NAV', data: navData, borderColor: '#e8913a', backgroundColor: 'rgba(232,145,58,0.08)', fill: false, tension: 0.3, pointStyle: navPointStyle, pointRadius: navPointRadius, pointBackgroundColor: navPointColor, yAxisID: 'y1' }
    ] },

        x: { ticks: { font: { size: 11 } } }
      }
    }
  });

  var baseDate = '2026-06-22';
  var html = '';
  for (var i = DATA.records.length - 1; i >= 0; i--) {

    var isBase = r.date === baseDate;

  }
  document.getElementById('tbody').innerHTML = html;
}
