<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Portfolio Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="enc_data.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

  #gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
  .gate-box { text-align: center; }
  .gate-box h2 { color: #fff; font-size: 1.4rem; margin-bottom: 24px; letter-spacing: 2px; }
  .gate-row { display: flex; gap: 8px; justify-content: center; }
  #code { padding: 12px 16px; font-size: 16px; border: 1px solid #3a3a5c; border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff; width: 220px; outline: none; transition: border-color 0.2s; }
  #code:focus { border-color: #4a6cf7; }
  #code::placeholder { color: #6a6a8a; }
  .go-btn { padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; background: #4a6cf7; color: #fff; cursor: pointer; transition: background 0.2s; }
  .go-btn:hover { background: #3a5ce5; }
  #gate-err { color: #e04040; margin-top: 14px; font-size: 0.85rem; display: none; }
  #gate-wait { color: #8a8aaa; margin-top: 14px; font-size: 0.85rem; display: none; }

  #app { display: none; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  h1 { text-align: center; font-size: 1.6rem; color: #1a1a1a; margin-bottom: 24px; }
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; transition: transform 0.15s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
  .card .label { font-size: 0.85rem; color: #888; margin-bottom: 8px; }
  .card .value { font-size: 1.8rem; font-weight: 700; }
  .card .sub { font-size: 0.8rem; margin-top: 6px; color: #999; }
  .up { color: #e04040 !important; }
  .down { color: #2eaa62 !important; }
  .flat { color: #888 !important; }
  .chart-wrap { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 28px; }
  .chart-wrap h2 { font-size: 1.1rem; margin-bottom: 16px; color: #333; }
  .table-wrap { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f0f4ff; padding: 12px 10px; font-size: 0.82rem; color: #555; text-align: center; border-bottom: 2px solid #d0d8f0; }
  td { padding: 10px; font-size: 0.85rem; text-align: center; border-bottom: 1px solid #f0f0f0; }
  tr:hover td { background: #f8f9ff; }
  tr.base-row td { background: #fff8e1; font-weight: 600; }
  .footer { text-align: center; font-size: 0.75rem; color: #aaa; margin-top: 20px; }
  @media (max-width: 700px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    .container { padding: 12px; }
    .card .value { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <h2>&#128202; Portfolio Viewer</h2>
    <div class="gate-row">
      <input type="text" id="code" placeholder="Enter access code" onkeydown="if(event.key==='Enter')_go()">
      <button class="go-btn" onclick="_go()">View</button>
    </div>
    <p id="gate-err">Invalid code</p>
    <p id="gate-wait">Loading...</p>
  </div>
</div>

<div id="app">
  <div class="container">
    <h1>&#128202; Portfolio Viewer</h1>
    <div class="cards" id="cards"></div>
    <div class="chart-wrap">
      <h2>&#128200; Index & NAV Trend</h2>
      <canvas id="chart"></canvas>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>YGE</th>
            <th>HK ETF</th>
            <th>MV (CNY 10k)</th>
            <th>Index</th>
            <th>NAV</th>
            <th>Chg%</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="footer">Base: 2026-06-22 | Base MV: 5,069.01 CNY 10k | Base Index: 1000.00 | NAV: 1.0000 | Updated: 2026-07-11</div>
  </div>
</div>

<script>
function _b2b(s) {
  var b = atob(s);
  var a = new Uint8Array(b.length);
  for (var i = 0; i < b.length; i++) a[i] = b.charCodeAt(i);
  return a.buffer;
}

async function _pk(p, s, n) {
  var e = new TextEncoder();
  var m = await crypto.subtle.importKey('raw', e.encode(p), {name:'PBKDF2'}, false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:s, iterations:n, hash:'SHA-256'},
    m,
    {name:'AES-GCM', length:256},
    false,
    ['decrypt']
  );
}

async function _go() {
  var v = document.getElementById('code').value;
  document.getElementById('gate-err').style.display = 'none';
  document.getElementById('gate-wait').style.display = 'block';
  try {
    var k = await _pk(v, _b2b(_a), _d);
    var r = await crypto.subtle.decrypt({name:'AES-GCM', iv:_b2b(_b)}, k, _b2b(_c));
    var D = JSON.parse(new TextDecoder().decode(r));
    document.getElementById('gate-wait').style.display = 'none';
    document.getElementById('gate').style.opacity = '0';
    setTimeout(function() { document.getElementById('gate').style.display = 'none'; }, 500);
    document.getElementById('app').style.display = 'block';
    _render(D);
  } catch(e) {
    document.getElementById('gate-wait').style.display = 'none';
    document.getElementById('gate-err').style.display = 'block';
    document.getElementById('code').select();
  }
}

function fmt(n, d) { return Number(n).toFixed(d); }
function chgClass(v) { return v === null || v === undefined ? 'flat' : (v >= 0 ? 'up' : 'down'); }
function chgSign(v) { return v === null || v === undefined ? '' : (v >= 0 ? '+' : ''); }
function arrow(v) { return v === null || v === undefined ? '' : (v >= 0 ? '\u25B2' : '\u25BC'); }

function _render(DATA) {
  var last = DATA.records[DATA.records.length - 1];
  document.getElementById('cards').innerHTML = [
    { label: 'Index', value: fmt(last.index, 2), sub: 'Base 1000pt' },
    { label: 'NAV', value: fmt(last.nav, 4), sub: 'Base 1.0000', cls: chgClass(last.chg_pct) },
    { label: 'Total MV', value: fmt(last.mv, 1), sub: 'CNY 10k' },
    { label: 'Daily Chg', value: chgSign(last.chg_pct) + fmt(last.chg_pct, 2) + '%', sub: arrow(last.chg_pct) + ' vs prev', cls: chgClass(last.chg_pct) }
  ].map(function(c) {
    return '<div class="card"><div class="label">' + c.label + '</div><div class="value ' + (c.cls||'') + '">' + c.value + '</div><div class="sub">' + c.sub + '</div></div>';
  }).join('');

  var labels = DATA.records.map(function(r) { return r.date; });
  var idxData = DATA.records.map(function(r) { return r.index; });
  var navData = DATA.records.map(function(r) { return r.nav; });

  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels: labels, datasets: [
      { label: 'Index', data: idxData, borderColor: '#4a6cf7', backgroundColor: 'rgba(74,108,247,0.10)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#4a6cf7', yAxisID: 'y' },
      { label: 'NAV', data: navData, borderColor: '#e8913a', backgroundColor: 'rgba(232,145,58,0.08)', fill: false, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#e8913a', yAxisID: 'y1' }
    ] },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'top', labels: { font: { size: 13 } } } },
      scales: {
        y: { type: 'linear', position: 'left', title: { display: true, text: 'Index' }, grid: { color: 'rgba(0,0,0,0.05)' } },
        y1: { type: 'linear', position: 'right', title: { display: true, text: 'NAV' }, grid: { drawOnChartArea: false }, min: 0.98 },
        x: { ticks: { font: { size: 11 } } }
      }
    }
  });

  var baseDate = '2026-06-22';
  var html = '';
  for (var i = DATA.records.length - 1; i >= 0; i--) {
    var r = DATA.records[i];
    var isBase = r.date === baseDate;
    var cls = isBase ? 'base-row' : '';
    var chgStr = r.chg_pct === null ? '-' : '<span class="' + chgClass(r.chg_pct) + '">' + chgSign(r.chg_pct) + fmt(r.chg_pct,2) + '% ' + arrow(r.chg_pct) + '</span>';
    html += '<tr class="' + cls + '"><td>' + r.date + (isBase ? ' \u2605' : '') + '</td><td>' + fmt(r.yge,2) + '</td><td>' + fmt(r.etf,4) + '</td><td>' + fmt(r.mv,1) + '</td><td>' + fmt(r.index,2) + '</td><td>' + fmt(r.nav,4) + '</td><td>' + chgStr + '</td></tr>';
  }
  document.getElementById('tbody').innerHTML = html;
}
</script>
</body>
</html>
